<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard — Jellyroll Designer</title>
<link rel="stylesheet" href="css/style.css">
<script>if (sessionStorage.getItem('jr_auth') !== '1') window.location.href = '/';</script>
<style>
  body { overflow: auto; height: 100vh; }
  .dash { max-width: 1200px; margin: 0 auto; padding: 16px; }
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .dash-header h1 { font-size: 18px; color: var(--fg); }
  .dash-header a { font-size: 11px; color: var(--accent); text-decoration: none; }
  .dash-header a:hover { text-decoration: underline; }

  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-card .val { font-size: 24px; font-weight: bold; color: var(--fg); }
  .stat-card .lbl { font-size: 10px; color: var(--fg2); margin-top: 2px; }

  .dash-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .dash-actions button { padding: 8px 16px; font-size: 12px; }

  .dash-filters { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .dash-filters input, .dash-filters select { padding: 5px 8px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); color: var(--fg); }
  .dash-filters input { width: 200px; }
  .dash-filters label { font-size: 10px; color: var(--fg2); }

  .items-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .items-table th { text-align: left; padding: 6px 8px; color: var(--fg2); font-size: 10px; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  .items-table th:hover { color: var(--fg); }
  .items-table th .sort-arrow { font-size: 8px; margin-left: 2px; }
  .items-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .items-table tr:hover { background: rgba(59,130,246,0.05); }
  .items-table tr.clickable { cursor: pointer; }
  .items-table tr.low-stock { color: var(--red); }

  .lots-subrow { background: var(--bg); }
  .lots-subrow td { padding: 4px 8px 4px 40px; font-size: 10px; color: var(--fg2); }
  .lots-table { width: 100%; border-collapse: collapse; font-size: 10px; margin: 4px 0; }
  .lots-table th { text-align: left; padding: 2px 6px; color: var(--fg2); border-bottom: 1px solid var(--border); font-weight: normal; }
  .lots-table td { padding: 2px 6px; }

  .low-stock-section { margin-top: 20px; }
  .low-stock-section h3 { font-size: 13px; color: var(--red); margin-bottom: 8px; }
  .low-stock-list { font-size: 11px; }
  .low-stock-list .item { padding: 4px 8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .low-stock-list .item .name { color: var(--fg); }
  .low-stock-list .item .detail { color: var(--fg2); }

  .modal-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; min-width: 400px; max-width: 600px; max-height: 85vh; overflow-y: auto; position: relative; }
  .close-btn { position: absolute; top: 8px; right: 12px; background: none; color: var(--fg2); font-size: 18px; cursor: pointer; border: none; }
  .close-btn:hover { color: var(--fg); }

  .inv-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inv-field { display: flex; flex-direction: column; gap: 2px; }
  .inv-field label { font-size: 10px; color: var(--fg2); }
  .inv-field input, .inv-field select, .inv-field textarea { width: 100%; padding: 4px 6px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); color: var(--fg); }
  .inv-field.inv-full { grid-column: span 2; }
  .inv-submit { margin-top: 10px; width: 100%; }
  .inv-preview-table { width: 100%; border-collapse: collapse; font-size: 10px; }
  .inv-preview-table th { text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border); color: var(--fg2); }
  .inv-preview-table td { padding: 3px 6px; border-bottom: 1px solid rgba(75,85,99,0.3); }

  .no-items { text-align: center; padding: 40px; color: var(--fg2); }

  .toast { position: fixed; bottom: 20px; right: 20px; padding: 8px 16px; border-radius: 6px; background: #16a34a; color: #fff; font-size: 12px; z-index: 10000; transition: opacity 0.3s; }
  .toast.error { background: #ef4444; }
</style>
</head>
<body>

<div class="dash">
  <div class="dash-header">
    <h1>Inventory Dashboard</h1>
    <a href="designer.html">&larr; Cell Designer</a>
  </div>

  <div class="stat-cards" id="statCards">
    <div class="stat-card"><div class="val" id="statTotalItems">—</div><div class="lbl">Total Items</div></div>
    <div class="stat-card"><div class="val" id="statLowStock" style="color:var(--red)">—</div><div class="lbl">Low Stock</div></div>
    <div class="stat-card"><div class="val" id="statTotalLots">—</div><div class="lbl">Total Lots</div></div>
    <div class="stat-card"><div class="val" id="statCategories">—</div><div class="lbl">Categories</div></div>
  </div>

  <div class="dash-actions">
    <button class="btn-primary" onclick="dashAction('add_item')">+ Add New Item</button>
    <button class="btn-primary" style="background:#0891b2" onclick="dashAction('receive')">Receive Shipment</button>
    <button class="btn-sm" onclick="dashAction('count')">Physical Count</button>
    <button class="btn-sm" id="btnApiSettingsDash" style="font-size:10px">&#9881; API Settings</button>
  </div>

  <div class="dash-filters">
    <input type="text" id="filterSearch" placeholder="Search by name..." oninput="renderTable()">
    <label>Type:</label>
    <select id="filterType" onchange="renderTable()"><option value="">All</option></select>
    <label>Process:</label>
    <select id="filterProcess" onchange="renderTable()"><option value="">All</option></select>
    <label>BOM:</label>
    <select id="filterBom" onchange="renderTable()"><option value="">All</option></select>
  </div>

  <table class="items-table" id="itemsTable">
    <thead>
      <tr>
        <th data-sort="name">Name <span class="sort-arrow"></span></th>
        <th data-sort="type">Type <span class="sort-arrow"></span></th>
        <th data-sort="process_step">Process <span class="sort-arrow"></span></th>
        <th data-sort="quantity" style="text-align:right">Qty <span class="sort-arrow"></span></th>
        <th data-sort="unit">Unit</th>
        <th data-sort="cost_per_unit" style="text-align:right">$/Unit <span class="sort-arrow"></span></th>
        <th data-sort="supplier">Supplier <span class="sort-arrow"></span></th>
        <th data-sort="bom_category">BOM Cat <span class="sort-arrow"></span></th>
        <th style="text-align:center">Lots</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>

  <div class="low-stock-section" id="lowStockSection" style="display:none">
    <h3>Low Stock Alerts</h3>
    <div class="low-stock-list" id="lowStockList"></div>
  </div>
</div>

<!-- Inventory Action Modal (reused from inventory-ui.js) -->
<div class="modal-overlay hidden" id="modalInventory">
  <div class="modal-box" style="min-width:550px">
    <button class="close-btn" onclick="closeDashModal()">&times;</button>
    <div id="invFormAddItem" style="display:none"></div>
    <div id="invFormUpdateItem" style="display:none"></div>
    <div id="invFormReceive" style="display:none"></div>
    <div id="invFormCount" style="display:none"></div>
    <div id="invFormRecipe" style="display:none"></div>
    <div id="invFormProduction" style="display:none"></div>
    <div id="invStatus" style="font-size:10px;margin-top:6px;min-height:14px"></div>
  </div>
</div>

<!-- API Settings Modal -->
<div class="modal-overlay hidden" id="modalSettings">
  <div class="modal-box">
    <button class="close-btn" onclick="document.getElementById('modalSettings').classList.add('hidden')">&times;</button>
    <h3>API Settings</h3>
    <label style="font-size:10px;color:var(--fg2)">API URL</label>
    <input type="text" id="settApiUrl" placeholder="http://localhost:8000" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--input-bg);color:var(--fg)">
    <label style="font-size:10px;color:var(--fg2)">API Key</label>
    <input type="password" id="settApiKey" placeholder="your-api-key" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--input-bg);color:var(--fg)">
    <button class="btn-primary" onclick="saveApiSettings(); loadDashboard();" style="width:100%;margin-top:6px">Save</button>
  </div>
</div>

<script src="js/api.js?v=20260501b"></script>
<script src="js/inventory-ui.js?v=20260501b"></script>
<script src="js/inventory-dashboard.js?v=20260501b"></script>
</body>
</html>
