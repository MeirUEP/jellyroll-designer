<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyroll Battery Cell Designer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
#authGate { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:#111827; }
#authGate.hidden { display:none; }
#authGate .box { background:#1f2937; border:1px solid #374151; border-radius:12px; padding:32px; text-align:center; min-width:300px; }
#authGate h2 { color:#f3f4f6; margin-bottom:16px; font-size:18px; }
#authGate input { width:100%; padding:10px 14px; border:1px solid #4b5563; border-radius:6px; background:#111827; color:#f3f4f6; font-size:14px; margin-bottom:12px; }
#authGate input:focus { outline:none; border-color:#3b82f6; }
#authGate button { width:100%; padding:10px; background:#3b82f6; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; }
#authGate button:hover { background:#2563eb; }
#authGate .err { color:#ef4444; font-size:12px; margin-top:8px; min-height:16px; }
:root {
  --bg: #111827; --bg2: #1f2937; --bg3: #374151; --fg: #f3f4f6; --fg2: #9ca3af;
  --accent: #3b82f6; --accent2: #2563eb; --green: #16a34a; --red: #ef4444;
  --border: #4b5563; --input-bg: #1f2937; --card-bg: #1f2937;
  --canvas-bg: #111827;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f9fafb; --bg2: #ffffff; --bg3: #e5e7eb; --fg: #111827; --fg2: #6b7280;
    --accent: #3b82f6; --accent2: #2563eb; --green: #16a34a; --red: #ef4444;
    --border: #d1d5db; --input-bg: #ffffff; --card-bg: #ffffff;
    --canvas-bg: #ffffff;
  }
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; font-size: 12px; color: var(--fg); background: var(--bg); overflow: hidden; height: 100vh; }
.app { display: grid; grid-template-columns: 228px 1fr; height: 100vh; }
.left { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
.right { display: flex; flex-direction: column; overflow: hidden; }
.panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
.panel h3 { font-size: 11px; text-transform: uppercase; color: var(--fg2); margin-bottom: 6px; letter-spacing: 0.5px; }
.param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.param-item { display: flex; flex-direction: column; gap: 2px; }
.param-item label { font-size: 10px; color: var(--fg2); }
.param-item input, .param-item select { width: 100%; padding: 3px 5px; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); color: var(--fg); font-size: 11px; }
.param-item input:focus { outline: none; border-color: var(--accent); }
button { cursor: pointer; border: none; border-radius: 4px; font-size: 11px; padding: 5px 10px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary.needs-run { background: #eab308; color: #000; animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.8; } }
.btn-sm { padding: 2px 6px; font-size: 10px; background: var(--bg3); color: var(--fg); }
.btn-sm:hover { background: var(--border); }
.btn-danger { background: var(--red); color: #fff; padding: 2px 6px; font-size: 10px; }
.run-bar { display: flex; gap: 6px; align-items: center; }
.run-bar .ts { font-size: 10px; color: var(--fg2); }
.layer-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px; margin-bottom: 4px; }
.layer-header { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.layer-header input[type="color"] { width: 22px; height: 22px; border: none; padding: 0; cursor: pointer; border-radius: 3px; }
.layer-header input[type="text"] { flex: 1; padding: 2px 4px; border: 1px solid var(--border); border-radius: 3px; background: var(--input-bg); color: var(--fg); font-size: 11px; font-weight: bold; }
.layer-header select { padding: 2px; border: 1px solid var(--border); border-radius: 3px; background: var(--input-bg); color: var(--fg); font-size: 10px; }
.layer-props { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 3px; margin-top: 4px; }
.layer-props .param-item input { font-size: 10px; padding: 2px 3px; }
.layer-actions { display: flex; gap: 2px; }
.badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; background: var(--accent); color: #fff; }
.info-bar { display: flex; gap: 8px; padding: 6px 10px; background: var(--bg2); border-bottom: 1px solid var(--border); font-size: 11px; flex-wrap: wrap; align-items: center; }
.info-bar span { color: var(--fg2); }
.info-bar strong { color: var(--fg); }
.view-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); }
.view-tab { padding: 8px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--fg2); background: none; border-radius: 0; }
.view-tab:hover { color: var(--fg); }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
/* Canvas area takes most of the space */
.canvas-wrap { flex: 1; min-height: 0; position: relative; overflow: auto; background: var(--canvas-bg); }
.canvas-wrap canvas { display: block; }
#threeContainer { width: 100%; height: 100%; }
/* Bottom section: collapsible summary + table */
.bottom-section { display: flex; flex-direction: column; max-height: 160px; overflow: hidden; flex-shrink: 0; }
.bottom-section.collapsed { max-height: 28px; }
.bottom-section.expanded { max-height: 350px; }
.bottom-toggle { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg2); border-top: 1px solid var(--border); cursor: pointer; font-size: 11px; color: var(--fg2); user-select: none; }
.bottom-toggle:hover { color: var(--fg); }
.summary-cards { display: flex; gap: 6px; padding: 6px 10px; background: var(--bg2); }
.summary-card { flex: 1; text-align: center; padding: 4px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
.summary-card .val { font-size: 14px; font-weight: bold; }
.summary-card .lbl { font-size: 9px; color: var(--fg2); }
.results-area { background: var(--bg2); overflow-y: auto; flex: 1; min-height: 0; }
.results-area table { width: 100%; border-collapse: collapse; font-size: 11px; }
.results-area th { background: var(--bg3); padding: 4px 6px; text-align: left; position: sticky; top: 0; }
.results-area td { padding: 3px 6px; border-bottom: 1px solid var(--border); }
.file-actions { display: flex; gap: 4px; padding: 4px 0; }
.legend { position: absolute; bottom: 10px; right: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 6px; font-size: 10px; max-height: 200px; overflow-y: auto; z-index: 10; }
.legend-item { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 2px 0; }
.legend-item .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid var(--border); }
.legend-item.hidden { opacity: 0.4; }
.legend-btns { display: flex; gap: 4px; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="authGate">
  <div class="box">
    <h2>Jellyroll Designer</h2>
    <input type="password" id="authPass" placeholder="Enter password" autofocus>
    <button onclick="checkAuth()">Unlock</button>
    <div class="err" id="authErr"></div>
  </div>
</div>
<div class="app" style="display:none" id="appMain">
  <div class="left">
    <div class="panel">
      <h3>Cell Parameters</h3>
      <div class="param-grid">
        <div class="param-item"><label>Mandrel dia (mm)</label><input type="number" id="p_mandrel_d" step="0.01" value="10.75"></div>
        <div class="param-item"><label>Target OD (mm)</label><input type="number" id="p_target_od" step="0.1" value="94"></div>
        <div class="param-item"><label>Cell height (mm)</label><input type="number" id="p_cell_h" step="0.1" value="222"></div>
        <div class="param-item"><label>Tab width (mm)</label><input type="number" id="p_tab_w" step="0.1" value="10"></div>
        <div class="param-item"><label>Tab height (mm)</label><input type="number" id="p_tab_h" step="0.1" value="15"></div>
        <div class="param-item"><label>Skip turns</label><input type="number" id="p_skip_turns" step="1" value="2"></div>
        <div class="param-item"><label>Cathode angle (&deg;)</label><input type="number" id="p_cath_angle" step="1" value="90"></div>
        <div class="param-item"><label>Anode angle (&deg;)</label><input type="number" id="p_anod_angle" step="1" value="270"></div>
      </div>
    </div>
    <div class="panel" id="panel3d" style="display:none">
      <h3>3D Display</h3>
      <div class="param-item"><label>Cutaway (&deg;)</label><input type="range" id="p_cut" min="10" max="360" value="270" style="width:100%"><span id="p_cut_val">270</span></div>
      <div class="param-item"><label>Layer scale</label><input type="range" id="p_rscale" min="1" max="20" value="8" style="width:100%"><span id="p_rscale_val">8</span></div>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="btn-sm" id="btnSpin">Auto-spin</button>
        <button class="btn-sm" id="btnResetCam">Reset view</button>
      </div>
    </div>
    <div class="panel">
      <h3>Cathode Properties</h3>
      <div class="param-grid">
        <div class="param-item"><label>Bulk density (g/cm&sup3;)</label><input type="number" id="ep_cath_bulk_density" step="0.01" value="2.41"></div>
        <div class="param-item"><label>Active wt% (EMD)</label><input type="number" id="ep_cath_active_wt" step="0.01" value="0.75"></div>
        <div class="param-item"><label>Spec. cap. (mAh/g)</label><input type="number" id="ep_cath_spec_cap" step="1" value="250"></div>
        <div class="param-item"><label>Mesh density (g/in&sup2;)</label><input type="number" id="ep_cath_mesh_dens" step="0.001" value="0.16"></div>
      </div>
    </div>
    <div class="panel">
      <h3>Anode Properties</h3>
      <div class="param-grid">
        <div class="param-item"><label>Bulk density (g/cm&sup3;)</label><input type="number" id="ep_anod_bulk_density" step="0.01" value="4.062"></div>
        <div class="param-item"><label>Zn wt%</label><input type="number" id="ep_anod_zn_wt" step="0.01" value="0.75"></div>
        <div class="param-item"><label>ZnO wt%</label><input type="number" id="ep_anod_zno_wt" step="0.01" value="0.16"></div>
        <div class="param-item"><label>Zn cap. (mAh/g)</label><input type="number" id="ep_anod_zn_cap" step="1" value="820"></div>
        <div class="param-item"><label>ZnO cap. (mAh/g)</label><input type="number" id="ep_anod_zno_cap" step="1" value="660"></div>
        <div class="param-item"><label>Mesh density (g/in&sup2;)</label><input type="number" id="ep_anod_mesh_dens" step="0.001" value="0.149"></div>
      </div>
    </div>
    <div class="panel">
      <h3>Layer Stack</h3>
      <div id="layerList"></div>
      <button class="btn-sm" id="btnAddLayer" style="margin-top:4px;width:100%">+ Add Layer</button>
    </div>
    <div class="run-bar">
      <button class="btn-primary" id="btnRun" style="flex:1">Run Simulation</button>
      <span class="ts" id="runTs"></span>
    </div>
    <div class="file-actions">
      <button class="btn-sm" id="btnSave">Save JSON</button>
      <button class="btn-sm" id="btnLoad">Load JSON</button>
      <input type="file" id="fileLoad" accept=".json" style="display:none">
      <button class="btn-sm" id="btnExport">Export CSV</button>
    </div>
  </div>
  <div class="right">
    <div class="info-bar" id="infoBar"></div>
    <div class="view-tabs">
      <button class="view-tab active" data-view="side">Side</button>
      <button class="view-tab" data-view="top">Top</button>
      <button class="view-tab" data-view="unroll">Unroll</button>
      <button class="view-tab" data-view="3d">3D</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
      <div id="threeContainer" style="display:none"></div>
    </div>
    <div class="bottom-section" id="bottomSection">
      <div class="bottom-toggle" id="bottomToggle">&#9660; Summary &amp; Tab Positions</div>
      <div class="summary-cards" id="summaryCards"></div>
      <div class="results-area" id="resultsArea"></div>
    </div>
  </div>
</div>
<script>
// ========== AUTH GATE ==========
function checkAuth() {
  const p = document.getElementById('authPass').value;
  if (p === atob('WmluY0Fub2Rl')) {
    document.getElementById('authGate').classList.add('hidden');
    document.getElementById('appMain').style.display = '';
    sessionStorage.setItem('jr_auth', '1');
    setTimeout(() => { window.dispatchEvent(new Event('resize')); runSimulation(); }, 100);
  } else {
    document.getElementById('authErr').textContent = 'Incorrect password';
    document.getElementById('authPass').value = '';
  }
}
document.getElementById('authPass').addEventListener('keydown', e => { if (e.key === 'Enter') checkAuth(); });
if (sessionStorage.getItem('jr_auth') === '1') {
  document.getElementById('authGate').classList.add('hidden');
  document.getElementById('appMain').style.display = '';
}

// Bottom section toggle
document.getElementById('bottomToggle').addEventListener('click', () => {
  const bs = document.getElementById('bottomSection');
  if (bs.classList.contains('collapsed')) {
    bs.classList.remove('collapsed');
    bs.classList.remove('expanded');
  } else if (bs.classList.contains('expanded')) {
    bs.classList.add('collapsed');
    bs.classList.remove('expanded');
  } else {
    bs.classList.add('expanded');
  }
  const icon = bs.classList.contains('collapsed') ? '&#9650;' : '&#9660;';
  document.getElementById('bottomToggle').innerHTML = icon + ' Summary &amp; Tab Positions';
  setTimeout(() => renderView(), 50);
});

// ========== STATE ==========
const LAYER_TYPES = ['mandrel','anode','cathode','separator','collector','tape','other'];
let layers = [
  {name:'Mandrel',type:'mandrel',t:5.375,w:230,len:0,off:0,color:'#888899'},
  {name:'Anode',type:'anode',t:1.0,w:222,len:1800,off:30,color:'#16a34a'},
  {name:'Kraft paper',type:'separator',t:0.15,w:228,len:2600,off:0,color:'#b45309'},
  {name:'Cellophane A',type:'separator',t:0.05,w:226,len:2440,off:0,color:'#38bdf8'},
  {name:'Cellophane B',type:'separator',t:0.05,w:226,len:2440,off:0,color:'#7dd3fc'},
  {name:'Cathode',type:'cathode',t:2.0,w:188,len:1920,off:0,color:'#3b82f6'},
  {name:'Cellophane C',type:'separator',t:0.05,w:226,len:2590,off:0,color:'#38bdf8'},
  {name:'Cellophane D',type:'separator',t:0.05,w:226,len:2590,off:0,color:'#7dd3fc'},
  {name:'Kraft paper 2',type:'separator',t:0.15,w:228,len:2670,off:0,color:'#d97706'},
  {name:'PVA lam.',type:'separator',t:0.1,w:224,len:1862,off:0,color:'#a855f7'},
];

let params = {
  mandrel_d: 10.75, target_od: 94, cell_h: 222,
  tab_w: 10, tab_h: 15, skip_turns: 2,
  cath_angle: 90, anod_angle: 270
};

let simResult = null;
let capResult = null;
let currentView = 'side';
let debounceTimer = null;

// Electrode properties (Rev 3 Can defaults from JellyRollModel_CORRECTED.xlsx)
let elecProps = {
  cath_bulk_density: 2.41,    // g/cm³ (with mesh)
  cath_active_wt: 0.75,       // EMD wt%
  cath_spec_cap: 250,         // mAh/g EMD
  cath_mesh_dens: 0.16,       // g/in² Ni mesh
  anod_bulk_density: 4.062,   // g/cm³ (with mesh)
  anod_zn_wt: 0.75,           // Zn wt%
  anod_zno_wt: 0.16,          // ZnO wt%
  anod_zn_cap: 820,           // mAh/g Zn
  anod_zno_cap: 660,          // mAh/g ZnO
  anod_mesh_dens: 0.149,      // g/in² Cu mesh
};

// 3D state
let threeScene, threeCamera, threeRenderer, threeControls;
let autoSpin = false;
let threeInited = false;

// Legend visibility
let layerVisibility = {};

// ========== SIMULATION ENGINE ==========
function runSimulation() {
  const r0 = params.mandrel_d / 2;
  let r = r0;
  let arc = 0;
  const turns = [];
  const nonMandrel = layers.filter(l => l.type !== 'mandrel');
  let n = 0;

  while (r < params.target_od / 2 && n < 500) {
    let pitch = 0;
    for (const l of nonMandrel) {
      if (arc >= l.off && arc < l.off + l.len) {
        pitch += l.t;
      }
    }
    if (pitch < 0.001) pitch = 0.001;
    if (r + pitch > params.target_od / 2) break;

    const circ = 2 * Math.PI * (r + pitch / 2);
    n++;
    const arcStart = arc;
    arc += circ;
    r += pitch;

    const active = nonMandrel.filter(l => arcStart >= l.off && arcStart < l.off + l.len);
    turns.push({ turn: n, r, arc, pitch, circ, arcStart, active });
  }

  // Tab placement
  const cathode = layers.find(l => l.type === 'cathode');
  const anode = layers.find(l => l.type === 'anode');
  const cTabs = [], aTabs = [];

  if (cathode) {
    for (let ti = 0; ti < turns.length; ti++) {
      if (ti < params.skip_turns) continue;
      const t = turns[ti];
      const tS = t.arc - t.circ;
      if (tS >= cathode.off && tS < cathode.off + cathode.len && t.arc <= cathode.off + cathode.len) {
        cTabs.push({ turn: t.turn, r: t.r, pitch: t.pitch, arcLen: t.arc, idx: cTabs.length + 1, circ: t.circ });
      }
    }
  }

  if (anode) {
    for (let ti = 0; ti < turns.length; ti++) {
      if (ti < params.skip_turns) continue;
      const t = turns[ti];
      const tS = t.arc - t.circ;
      const half = Math.PI * t.r;
      const aArc = t.arc + half;
      if (tS >= anode.off && tS < anode.off + anode.len && aArc <= anode.off + anode.len) {
        aTabs.push({ turn: t.turn, r: t.r, pitch: t.pitch, arcLen: aArc, idx: aTabs.length + 1, circ: t.circ });
      }
    }
  }

  for (let i = 1; i < cTabs.length; i++) cTabs[i].spacing = cTabs[i].arcLen - cTabs[i-1].arcLen;
  for (let i = 1; i < aTabs.length; i++) aTabs[i].spacing = aTabs[i].arcLen - aTabs[i-1].arcLen;

  const outerR = turns.length > 0 ? turns[turns.length - 1].r : r0;
  const pitches = turns.map(t => t.pitch);

  simResult = {
    turns, cTabs, aTabs, outerR,
    minPitch: pitches.length ? Math.min(...pitches) : 0,
    maxPitch: pitches.length ? Math.max(...pitches) : 0,
  };

  document.getElementById('btnRun').classList.remove('needs-run');
  document.getElementById('runTs').textContent = new Date().toLocaleTimeString();
  computeCapacity();
  updateInfoBar();
  updateSummary();
  updateTable();
  renderView();
}

// ========== CAPACITY CALCULATION (from JellyRollModel_CORRECTED.xlsx) ==========
function computeCapacity() {
  if (!simResult) { capResult = null; return; }
  const s = simResult;
  const ep = elecProps;
  const cathode = layers.find(l => l.type === 'cathode');
  const anode = layers.find(l => l.type === 'anode');
  if (!cathode || !anode) { capResult = null; return; }

  // Electrode lengths from simulation (use the layer length in mm, convert to inches for mesh calc)
  const cathLenMm = cathode.len;
  const anodLenMm = anode.len;
  const cathLenIn = cathLenMm / 25.4;
  const anodLenIn = anodLenMm / 25.4;

  // Widths (mm -> inches for volume/mesh calc)
  const cathWidthMm = cathode.w;
  const anodWidthMm = anode.w;
  const cathWidthIn = cathWidthMm / 25.4;
  const anodWidthIn = anodWidthMm / 25.4;

  // Thicknesses (mm -> inches)
  const cathThickMm = cathode.t;
  const anodThickMm = anode.t;
  const cathThickIn = cathThickMm / 25.4;
  const anodThickIn = anodThickMm / 25.4;

  // Volumes (in³) = length × width × thickness
  const cathVolIn3 = cathLenIn * cathWidthIn * cathThickIn;
  const anodVolIn3 = anodLenIn * anodWidthIn * anodThickIn;

  // Total mass (g) = volume (cm³) × bulk density
  // 1 in³ = 16.387064 cm³
  const in3ToCm3 = 16.387064;
  const cathVolCm3 = cathVolIn3 * in3ToCm3;
  const anodVolCm3 = anodVolIn3 * in3ToCm3;
  const cathTotalMass = cathVolCm3 * ep.cath_bulk_density;
  const anodTotalMass = anodVolCm3 * ep.anod_bulk_density;

  // Mesh mass (g) = mesh_density (g/in²) × length (in) × width (in)
  const cathMeshMass = ep.cath_mesh_dens * cathLenIn * cathWidthIn;
  const anodMeshMass = ep.anod_mesh_dens * anodLenIn * anodWidthIn;

  // Paste mass = total - mesh
  const cathPasteMass = cathTotalMass - cathMeshMass;
  const anodPasteMass = anodTotalMass - anodMeshMass;

  // Cathode capacity (Ah) = paste_mass × active_wt% × specific_capacity / 1000
  const cathCapAh = cathPasteMass * ep.cath_active_wt * ep.cath_spec_cap / 1000;

  // Anode capacity (Ah) = paste_mass × (Zn_wt% × Zn_cap + ZnO_wt% × ZnO_cap) / 1000
  const anodCapAh = anodPasteMass * (ep.anod_zn_wt * ep.anod_zn_cap + ep.anod_zno_wt * ep.anod_zno_cap) / 1000;

  // Cell capacity (cathode-limited, 1e⁻)
  const cellCapAh = Math.min(cathCapAh, anodCapAh);
  const npRatio = cathCapAh / anodCapAh;

  // Cell energy at 1.2V (1e⁻)
  const cellEnergy1e = cellCapAh * 1.2;

  // Total dry mass
  const totalDryMass = cathTotalMass + anodTotalMass;

  // Utilization table
  const utilTable = [10, 20, 30, 40, 50, 60, 80, 100, 120, 140, 160, 180, 200, 220].map(cycledAh => ({
    cycledAh,
    cathUtil: (cycledAh / cathCapAh * 100),
    anodUtil: (cycledAh / anodCapAh * 100),
    energy: cycledAh * 1.2,
    anodExcess: ((anodCapAh - cycledAh) / cycledAh * 100),
    dod: (cycledAh / cathCapAh * 100),
  }));

  capResult = {
    cathTotalMass, anodTotalMass, cathMeshMass, anodMeshMass,
    cathPasteMass, anodPasteMass,
    cathCapAh, anodCapAh, cellCapAh, npRatio,
    cellEnergy1e, totalDryMass,
    cathVolCm3, anodVolCm3,
    utilTable,
    // Store source layer values for transparency
    cathThickMm, anodThickMm, cathWidthMm, anodWidthMm, cathLenMm, anodLenMm,
  };
}

      <strong style="font-size:11px">Mass &amp; Capacity</strong>
      <div style="font-size:10px;color:var(--fg2);margin:2px 0">Geometry from layer stack &bull; Material properties from panels above</div>
      <table style="margin-top:4px"><thead><tr><th></th><th>Cathode</th><th>Anode</th><th>Unit</th><th style="color:var(--fg2)">Source</th></tr></thead><tbody>

      <tr style="color:var(--fg2)"><td>Length</td><td>${c.cathLenMm.toFixed(0)}</td><td>${c.anodLenMm.toFixed(0)}</td><td>mm</td><td>Layer stack</td></tr>
      <tr><td>Volume</td><td>${c.cathVolCm3.toFixed(1)}</td><td>${c.anodVolCm3.toFixed(1)}</td><td>cm&sup3;</td><td></td></tr>
      <tr><td>Total mass (w/ mesh)</td><td>${c.cathTotalMass.toFixed(1)}</td><td>${c.anodTotalMass.toFixed(1)}</td><td>g</td><td></td></tr>
      <tr><td>Mesh mass</td><td>${c.cathMeshMass.toFixed(1)}</td><td>${c.anodMeshMass.toFixed(1)}</td><td>g</td><td></td></tr>

      <tr><td style="font-weight:bold">Capacity</td><td style="color:#3b82f6;font-weight:bold">${c.cathCapAh.toFixed(1)}</td><td style="color:#16a34a;font-weight:bold">${c.anodCapAh.toFixed(1)}</td><td>Ah</td><td></td></tr>

    // Utilization table

// ========== LAYER EDITOR ==========
function buildLayerUI() {
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  layers.forEach((l, i) => {
    const card = document.createElement('div');
    card.className = 'layer-card';
    card.innerHTML = `
      <div class="layer-header">
        <input type="color" value="${l.color}" data-i="${i}" data-f="color">
        <input type="text" value="${l.name}" data-i="${i}" data-f="name">
        <select data-i="${i}" data-f="type">${LAYER_TYPES.map(t=>`<option value="${t}"${t===l.type?' selected':''}>${t}</option>`).join('')}</select>
        ${l.type==='cathode'?`<span class="badge">${params.cath_angle}&deg;</span>`:l.type==='anode'?`<span class="badge">${params.anod_angle}&deg;</span>`:''}
        <div class="layer-actions">
          <button class="btn-sm" data-move="${i}" data-dir="-1" ${i===0?'disabled':''}>&#9650;</button>
          <button class="btn-sm" data-move="${i}" data-dir="1" ${i===layers.length-1?'disabled':''}>&#9660;</button>
          <button class="btn-danger" data-del="${i}">&times;</button>
        </div>
      </div>
      <div class="layer-props">
        <div class="param-item"><label>Thick</label><input type="number" step="0.01" value="${l.t}" data-i="${i}" data-f="t"></div>
        <div class="param-item"><label>Width</label><input type="number" step="0.1" value="${l.w}" data-i="${i}" data-f="w"></div>
        <div class="param-item"><label>Length</label><input type="number" step="1" value="${l.len}" data-i="${i}" data-f="len"></div>
        <div class="param-item"><label>Offset</label><input type="number" step="1" value="${l.off}" data-i="${i}" data-f="off"></div>
      </div>`;
    list.appendChild(card);
  });

  list.querySelectorAll('input,select').forEach(el => {
    el.addEventListener('change', e => {
      const i = +e.target.dataset.i, f = e.target.dataset.f;
      if (f === 'name' || f === 'color' || f === 'type') layers[i][f] = e.target.value;
      else layers[i][f] = +e.target.value;
      markDirty();
      if (f === 'type') buildLayerUI();
    });
  });
  list.querySelectorAll('[data-move]').forEach(el => {
    el.addEventListener('click', e => {
      const btn = e.target.closest('[data-move]');
      const i = +btn.dataset.move, d = +btn.dataset.dir;
      const j = i + d;
      if (j < 0 || j >= layers.length) return;
      [layers[i], layers[j]] = [layers[j], layers[i]];
      buildLayerUI(); markDirty();
    });
  });
  list.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => {
      const btn = e.target.closest('[data-del]');
      layers.splice(+btn.dataset.del, 1);
      buildLayerUI(); markDirty();
    });
  });
}

function markDirty() {
  // Auto-run with debounce
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => runSimulation(), 300);
}

document.getElementById('btnAddLayer').addEventListener('click', () => {
  layers.push({name:'New Layer',type:'separator',t:0.1,w:220,len:1000,off:0,color:'#888888'});
  buildLayerUI(); markDirty();
});

// Param inputs — auto-run on change
document.querySelectorAll('.param-grid input').forEach(el => {
  el.addEventListener('change', e => {
    const id = e.target.id;
    if (id.startsWith('p_')) {
      params[id.replace('p_','')] = +e.target.value;
    } else if (id.startsWith('ep_')) {
      elecProps[id.replace('ep_','')] = +e.target.value;

    markDirty();
  });
});

function renderView() {
  if (!simResult) return;
  if (currentView === 'side') renderSide();
  else if (currentView === 'top') renderTop();
  else if (currentView === 'unroll') renderUnroll();
  else if (currentView === '3d') render3D();
}

function var_fg() {
  return getComputedStyle(document.documentElement).getPropertyValue('--fg').trim() || '#f3f4f6';
}
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ========== SIDE VIEW (improved) ==========
function renderSide() {
  const canvas = document.getElementById('mainCanvas');
  const wrap = document.getElementById('canvasWrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (!simResult) return;

  const s = simResult;
  const outerR = s.outerR;
  const cellH = params.cell_h;
  const tabH = params.tab_h;
  const mandrelR = params.mandrel_d / 2;
  const fg = var_fg();

  const PAD_L = 70, PAD_R = 70, PAD_BOT = 50;
  const TAB_AREA = 70; // more space for tab labels above cell
  // Scale to use full canvas height
  const availW = W - PAD_L - PAD_R;
  const availH = H - TAB_AREA - PAD_BOT;
  const sc = Math.min(availW / (outerR * 2), availH / cellH);

  const cx = W / 2;
  const cellTop = TAB_AREA;
  const cellBot = cellTop + cellH * sc;
  const cellLeft = cx - outerR * sc;
  const cellRight = cx + outerR * sc;

  // Cell rectangle outline
  ctx.strokeStyle = fg; ctx.lineWidth = 1.5;
  ctx.strokeRect(cellLeft, cellTop, outerR * 2 * sc, cellH * sc);

  // Draw layer-colored rings for each turn
  s.turns.forEach((turn, ti) => {
    const prevR = ti > 0 ? s.turns[ti-1].r : mandrelR;
    const innerR_t = prevR;
    const bandW = turn.r - innerR_t;

    turn.active.forEach((layer, li) => {
      const nActive = turn.active.length;
      const rInner = innerR_t + (bandW / nActive) * li;
      const rOuter = innerR_t + (bandW / nActive) * (li + 1);

      // Left half
      const lx = cx - rOuter * sc;
      const lw = (rOuter - rInner) * sc;
      // Right half
      const rx = cx + rInner * sc;

      // Determine height based on layer width vs cell height
      const layerH = layer.w * sc;
      const yOff = (cellH * sc - layerH) / 2;

      ctx.fillStyle = hexToRgba(layer.color, 0.5);
      // Left side
      ctx.fillRect(lx, cellTop + yOff, lw, layerH);
      // Right side
      ctx.fillRect(rx, cellTop + yOff, lw, layerH);
    });

    // Faint turn boundary lines
    const x1 = cx - turn.r * sc, x2 = cx + turn.r * sc;
    ctx.strokeStyle = 'rgba(150,150,150,0.15)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x1, cellTop); ctx.lineTo(x1, cellBot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2, cellTop); ctx.lineTo(x2, cellBot); ctx.stroke();
  });

  // Mandrel shading
  ctx.fillStyle = hexToRgba('#888899', 0.4);
  ctx.fillRect(cx - mandrelR * sc, cellTop, mandrelR * 2 * sc, cellH * sc);

  // Tabs as uniform thin lines with fanned-out leader labels
  // Spread labels across full canvas halves to prevent overlap
  const tabLineH = 20;
  function drawSideTabs(tabs, color, prefix, side) {
    const count = tabs.length;
    if (count === 0) return;
    // Use full canvas half for label spread (with padding)
    const pad = 20;
    const minLabelSpacing = 18; // minimum px between labels
    const neededWidth = count * minLabelSpacing;
    let areaStart, areaEnd;
    if (side === 'left') {
      areaEnd = cx - 10;
      areaStart = Math.max(pad, areaEnd - neededWidth);
    } else {
      areaStart = cx + 10;
      areaEnd = Math.min(W - pad, areaStart + neededWidth);
    }
    const labelSpacing = count > 1 ? (areaEnd - areaStart) / (count - 1) : 0;

    tabs.forEach((tab, i) => {
      const x = side === 'left' ? cx - tab.r * sc : cx + tab.r * sc;
      // Vertical line from cell top upward
      ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x, cellTop); ctx.lineTo(x, cellTop - tabLineH); ctx.stroke();
      // Dot at cell top
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, cellTop, 2, 0, Math.PI * 2); ctx.fill();
      // Fan out label positions evenly across available space
      const labelX = count > 1 ? areaStart + i * labelSpacing : (areaStart + areaEnd) / 2;
      const labelY = 14;
      // Leader line
      ctx.strokeStyle = color; ctx.lineWidth = 0.5; ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.moveTo(x, cellTop - tabLineH); ctx.lineTo(labelX, labelY + 4); ctx.stroke();
      ctx.globalAlpha = 1;
      // Label
      ctx.fillStyle = color; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`${prefix}${tab.idx}`, labelX, labelY);
    });
  }

  drawSideTabs(s.cTabs, '#3b82f6', 'C', 'left');
  drawSideTabs(s.aTabs, '#16a34a', 'A', 'right');

  // Dimension annotations with bracket lines
  ctx.strokeStyle = fg; ctx.fillStyle = fg; ctx.lineWidth = 0.8;
  ctx.font = '10px sans-serif';

  // Cell height — right side bracket
  const dimX = cellRight + 20;
  ctx.beginPath();
  ctx.moveTo(dimX - 4, cellTop); ctx.lineTo(dimX, cellTop); ctx.lineTo(dimX, cellBot); ctx.lineTo(dimX - 4, cellBot);
  ctx.stroke();
  ctx.textAlign = 'left';
  ctx.fillText(`${cellH}mm`, dimX + 4, (cellTop + cellBot) / 2 + 4);

  // OD — bottom bracket
  const dimY = cellBot + 20;
  ctx.beginPath();
  ctx.moveTo(cellLeft, dimY - 4); ctx.lineTo(cellLeft, dimY); ctx.lineTo(cellRight, dimY); ctx.lineTo(cellRight, dimY - 4);
  ctx.stroke();
  ctx.textAlign = 'center';
  ctx.fillText(`OD ${(outerR*2).toFixed(1)}mm`, cx, dimY + 14);

  // Mandrel diameter — below OD
  const mLeft = cx - mandrelR * sc, mRight = cx + mandrelR * sc;
  const dimY2 = dimY + 24;
  ctx.strokeStyle = '#888899';
  ctx.beginPath();
  ctx.moveTo(mLeft, dimY2 - 4); ctx.lineTo(mLeft, dimY2); ctx.lineTo(mRight, dimY2); ctx.lineTo(mRight, dimY2 - 4);
  ctx.stroke();
  ctx.fillStyle = '#888899';
  ctx.fillText(`\u00D8${params.mandrel_d}mm`, cx, dimY2 + 14);

  // Layer legend for side view
  ctx.textAlign = 'left'; ctx.font = '10px sans-serif';
  const uniqueLayers = [];
  const seen = new Set();
  layers.filter(l => l.type !== 'mandrel').forEach(l => {
    const key = l.name.startsWith('Cellophane') ? 'Cellophane' : l.name;
    if (!seen.has(key)) { seen.add(key); uniqueLayers.push({name: key, color: l.color}); }
  });
  const legX = 10, legY0 = cellTop + 10;
  uniqueLayers.forEach((l, i) => {
    const y = legY0 + i * 16;
    ctx.fillStyle = l.color;
    ctx.fillRect(legX, y, 10, 10);
    ctx.strokeStyle = var_fg(); ctx.lineWidth = 0.5;
    ctx.strokeRect(legX, y, 10, 10);
    ctx.fillStyle = fg;
    ctx.fillText(l.name, legX + 14, y + 9);
  });
}

// ========== TOP VIEW (improved) ==========
function renderTop() {
  const canvas = document.getElementById('mainCanvas');
  const wrap = document.getElementById('canvasWrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (!simResult) return;

  const s = simResult;
  const outerR = s.outerR;
  const mandrelR = params.mandrel_d / 2;
  const fg = var_fg();

  const tabLen = 35;
  const PAD_SIDES = 50, PAD_TOP = tabLen + 40, PAD_BOT = 40;
  const sc = Math.min((W - PAD_SIDES*2) / (outerR*2), (H - PAD_TOP - PAD_BOT) / (outerR*2));
  const cx = W / 2;
  const cy = PAD_TOP + outerR * sc;

  // Outer boundary circle
  ctx.beginPath(); ctx.arc(cx, cy, outerR * sc, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(150,150,150,0.4)'; ctx.lineWidth = 1; ctx.stroke();

  // Layer arcs per turn — with distinct colors and thickness for electrodes
  s.turns.forEach((turn, ti) => {
    const prevR = ti > 0 ? s.turns[ti-1].r : mandrelR;
    const innerR = prevR;
    const bandW = turn.r - innerR;
    const nActive = turn.active.length;
    if (nActive === 0) return;

    turn.active.forEach((layer, li) => {
      const vis = layerVisibility[layer.name] !== false;
      if (!vis) return;
      const rMid = innerR + (bandW / nActive) * (li + 0.5);
      const baseThick = bandW / nActive * 0.85;
      // Electrodes get thicker strokes
      const isElectrode = layer.type === 'cathode' || layer.type === 'anode';
      const lw = isElectrode ? Math.max(2.5, baseThick * sc * 1.2) : Math.max(1, baseThick * sc);

      // Compute partial arc angles
      const layerArcStart = Math.max(turn.arcStart, layer.off);
      const layerArcEnd = Math.min(turn.arc, layer.off + layer.len);
      const turnArcLen = turn.circ;
      const fracStart = (layerArcStart - turn.arcStart) / turnArcLen;
      const fracEnd = (layerArcEnd - turn.arcStart) / turnArcLen;
      const angStart = -Math.PI/2 + fracStart * Math.PI * 2;
      const angEnd = -Math.PI/2 + fracEnd * Math.PI * 2;

      ctx.beginPath();
      ctx.arc(cx, cy, rMid * sc, angStart, angEnd);
      ctx.strokeStyle = layer.color;
      ctx.lineWidth = lw;
      ctx.globalAlpha = isElectrode ? 1.0 : 0.7;
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Endpoint markers
      const sx = cx + rMid * sc * Math.cos(angStart);
      const sy = cy + rMid * sc * Math.sin(angStart);
      const ex = cx + rMid * sc * Math.cos(angEnd);
      const ey = cy + rMid * sc * Math.sin(angEnd);
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI*2); ctx.fillStyle=layer.color; ctx.fill();
    });
  });

  // Mandrel circle
  ctx.beginPath(); ctx.arc(cx, cy, mandrelR * sc, 0, Math.PI * 2);
  ctx.fillStyle = '#888899'; ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1; ctx.stroke();

  // Turn number labels on outermost ring
  if (s.turns.length > 0) {
    ctx.font = '8px sans-serif'; ctx.fillStyle = fg; ctx.textAlign = 'center';
    s.turns.forEach((t, i) => {
      // Place at bottom-right area to avoid tab overlap
      const ang = Math.PI / 4 + (i / s.turns.length) * Math.PI; // bottom-right quadrant
      const lx = cx + (t.r * sc + 10) * Math.cos(ang);
      const ly = cy + (t.r * sc + 10) * Math.sin(ang);
      if (i % 2 === 0 || s.turns.length <= 6) { // skip some if too many
        ctx.fillText(`T${t.turn}`, lx, ly + 3);
      }
    });
  }

  // Tab lines at correct drill angles, radiating outward from circle
  // Canvas convention: 0° = 3 o'clock, 90° = 12 o'clock (top)
  // Canvas angle: -PI/2 for 90° (12 o'clock), PI/2 for 270° (6 o'clock)
  // Tab labels laid out in a horizontal row above/below the circle
  // with leader lines to dots at the actual ring positions
  function drawTabsWithLabels(tabs, color, prefix, cellAngleDeg) {
    const canvasAng = -cellAngleDeg * Math.PI / 180;
    const dx0 = Math.cos(canvasAng);
    const dy0 = Math.sin(canvasAng);
    const count = tabs.length;
    if (count === 0) return;

    // Place labels in a horizontal row
    // Cathode at 90° (top) → labels go above; Anode at 270° (bottom) → labels also above
    const labelRowY = 12;
    const minSpacing = 18;
    const totalWidth = count * minSpacing;
    const startX = cx - totalWidth / 2;

    tabs.forEach((tab, i) => {
      const r1 = tab.r * sc;
      // Dot at ring position along drill angle
      const x1 = cx + r1 * dx0;
      const y1 = cy + r1 * dy0;
      ctx.beginPath(); ctx.arc(x1, y1, 2, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();

      // Label position in horizontal row
      const labelX = startX + i * minSpacing + minSpacing / 2;

      // Leader line
      ctx.strokeStyle = color; ctx.lineWidth = 0.6; ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(labelX, labelRowY + 5); ctx.stroke();
      ctx.globalAlpha = 1;

      // Label
      ctx.fillStyle = color; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`${prefix}${tab.idx}`, labelX, labelRowY);
    });
  }

  drawTabsWithLabels(s.cTabs, '#3b82f6', 'C', params.cath_angle);
  drawTabsWithLabels(s.aTabs, '#16a34a', 'A', params.anod_angle);

  // Angle labels at the drill positions
  const cCanvAng = -params.cath_angle * Math.PI / 180;
  const aCanvAng = -params.anod_angle * Math.PI / 180;
  ctx.font = 'bold 10px sans-serif'; ctx.fillStyle = fg; ctx.textAlign = 'center';
  const angLabelR = outerR * sc + 8;
  ctx.fillText(`${params.cath_angle}°`, cx + angLabelR * Math.cos(cCanvAng), cy + angLabelR * Math.sin(cCanvAng));

  renderLegend();
}

function renderLegend() {
  let legend = document.getElementById('topLegend');
  if (!legend) {
    legend = document.createElement('div');
    legend.id = 'topLegend';
    legend.className = 'legend';
    document.getElementById('canvasWrap').appendChild(legend);
  }
  legend.style.display = currentView === 'top' ? '' : 'none';
  if (currentView !== 'top') return;

  const groups = {};
  layers.filter(l => l.type !== 'mandrel').forEach(l => {
    const key = l.name.startsWith('Cellophane') ? 'Cellophane' : l.name;
    if (!groups[key]) groups[key] = { color: l.color, layers: [] };
    groups[key].layers.push(l);
  });

  let html = '<div class="legend-btns"><button class="btn-sm" id="legendAll">All</button><button class="btn-sm" id="legendNone">None</button></div>';
  for (const [key, g] of Object.entries(groups)) {
    const anyVisible = g.layers.some(l => layerVisibility[l.name] !== false);
    html += `<div class="legend-item${anyVisible?'':' hidden'}" data-group="${key}"><div class="swatch" style="background:${g.color}"></div><span>${key}</span></div>`;
  }
  legend.innerHTML = html;

  legend.querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.group;
      const g = groups[key];
      const anyVisible = g.layers.some(l => layerVisibility[l.name] !== false);
      g.layers.forEach(l => layerVisibility[l.name] = !anyVisible);
      renderView();
    });
  });
  document.getElementById('legendAll')?.addEventListener('click', () => {
    layers.forEach(l => layerVisibility[l.name] = true); renderView();
  });
  document.getElementById('legendNone')?.addEventListener('click', () => {
    layers.forEach(l => layerVisibility[l.name] = false); renderView();
  });
}

// ========== UNROLL VIEW (improved) ==========
function renderUnroll() {
  const canvas = document.getElementById('mainCanvas');
  const wrap = document.getElementById('canvasWrap');
  const W = wrap.clientWidth;
  const ctx = canvas.getContext('2d');
  if (!simResult) return;

  const s = simResult;
  const nonMandrel = layers.filter(l => l.type !== 'mandrel');
  const maxLen = Math.max(...nonMandrel.map(l => l.off + l.len));
  const fg = var_fg();

  const PAD_L = 112, PAD_R = 20;
  const RULER_H = 36;
  const stripH = 22;
  const stripGap = 6;
  const tabZone = 50;
  const sc = (W - PAD_L - PAD_R) / maxLen;

  // Compute total height
  let totalH = RULER_H + 10;
  nonMandrel.forEach(l => {
    if (l.type === 'cathode' || l.type === 'anode') totalH += tabZone;
    totalH += stripH + stripGap;
  });
  totalH += 50;

  canvas.width = W;
  canvas.height = Math.max(totalH, wrap.clientHeight);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ruler background
  ctx.fillStyle = 'rgba(50,50,60,0.5)';
  ctx.fillRect(0, 0, W, RULER_H);

  // mm scale (bottom of ruler)
  ctx.fillStyle = fg; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  const mmStep = Math.pow(10, Math.floor(Math.log10(maxLen / 10)));
  for (let mm = 0; mm <= maxLen; mm += mmStep) {
    const x = PAD_L + mm * sc;
    if (x > W - PAD_R) break;
    ctx.fillText(`${mm}`, x, RULER_H - 4);
    ctx.beginPath(); ctx.moveTo(x, RULER_H - 14); ctx.lineTo(x, RULER_H - 8);
    ctx.strokeStyle = 'rgba(150,150,150,0.5)'; ctx.lineWidth = 0.5; ctx.stroke();
  }

  // Turn markers (top of ruler) + full vertical grid lines
  ctx.font = '8px sans-serif';
  s.turns.forEach(t => {
    const x = PAD_L + t.arc * sc;
    if (x > W - PAD_R) return;
    ctx.fillStyle = 'rgba(150,150,150,0.7)';
    ctx.fillText(`T${t.turn}`, x, 10);
    // Full-height grid line
    ctx.beginPath(); ctx.moveTo(x, RULER_H); ctx.lineTo(x, canvas.height);
    ctx.strokeStyle = 'rgba(100,100,100,0.15)'; ctx.lineWidth = 0.5; ctx.stroke();
  });

  // Strips
  let y = RULER_H + 10;
  nonMandrel.forEach(l => {
    const isElectrode = l.type === 'cathode' || l.type === 'anode';
    if (isElectrode) {
      const tabs = l.type === 'cathode' ? s.cTabs : s.aTabs;
      const color = l.type === 'cathode' ? '#3b82f6' : '#16a34a';
      const prefix = l.type === 'cathode' ? 'C' : 'A';
      tabs.forEach((tab, ti) => {
        const tx = PAD_L + tab.arcLen * sc;
        // Tab line pointing down
        ctx.beginPath(); ctx.moveTo(tx, y + 10); ctx.lineTo(tx, y + tabZone - 4);
        ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
        // Arrow tip pointing down
        ctx.beginPath(); ctx.moveTo(tx, y + tabZone - 4); ctx.lineTo(tx - 3, y + tabZone - 10); ctx.lineTo(tx + 3, y + tabZone - 10); ctx.closePath();
        ctx.fillStyle = color; ctx.fill();
        // Label at top — stagger to avoid overlap
        ctx.fillStyle = color; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
        const labelOff = (ti % 2) * 8;
        ctx.fillText(`${prefix}${tab.idx}`, tx, y + 8 - labelOff);
      });
      y += tabZone;
    }

    const stripY = y;
    const x0 = PAD_L + l.off * sc;
    const w = l.len * sc;

    // Faint background
    ctx.fillStyle = 'rgba(100,100,100,0.08)';
    ctx.fillRect(PAD_L, stripY, (W - PAD_L - PAD_R), stripH);

    // Strip
    ctx.fillStyle = hexToRgba(l.color, 0.7);
    ctx.fillRect(x0, stripY, w, stripH);
    ctx.strokeStyle = l.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(x0, stripY, w, stripH);

    // Label on left
    ctx.fillStyle = fg;
    ctx.font = isElectrode ? 'bold 11px sans-serif' : '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(l.name, PAD_L - 6, stripY + stripH / 2 + 4);

    // Length label inside strip
    if (w > 50) {
      ctx.fillStyle = '#fff'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`${l.len}mm`, x0 + w / 2, stripY + stripH / 2 + 3);
    }

    // Start marker
    if (l.off > 0) {
      ctx.beginPath(); ctx.moveTo(x0, stripY); ctx.lineTo(x0 + 5, stripY + stripH/2); ctx.lineTo(x0, stripY + stripH);
      ctx.fillStyle = l.color; ctx.fill();
    }

    // End marker
    ctx.beginPath();
    ctx.moveTo(x0 + w, stripY); ctx.lineTo(x0 + w - 5, stripY + stripH/2); ctx.lineTo(x0 + w, stripY + stripH);
    ctx.fillStyle = l.color; ctx.fill();

    // Arc length annotations for tabs — stagger above/below
    if (isElectrode) {
      const tabs = l.type === 'cathode' ? s.cTabs : s.aTabs;
      const color = l.type === 'cathode' ? '#3b82f6' : '#16a34a';
      tabs.forEach((tab, ti) => {
        const tx = PAD_L + tab.arcLen * sc;
        ctx.fillStyle = color; ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
        // Alternate above/below to avoid overlap
        const yOff = (ti % 2 === 0) ? stripY + stripH + 10 : stripY + stripH + 19;
        ctx.fillText(`${tab.arcLen.toFixed(0)}`, tx, yOff);
      });
    }

    y += stripH + stripGap;
  });
}

// ========== 3D VIEW (improved) ==========
function render3D() {
  if (!threeInited) init3D();
  update3DScene();
}

function init3D() {
  const container = document.getElementById('threeContainer');
  threeScene = new THREE.Scene();
  threeScene.background = new THREE.Color(getComputedStyle(document.documentElement).getPropertyValue('--canvas-bg').trim() || '#111827');

  threeCamera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 10000);
  threeRenderer = new THREE.WebGLRenderer({ antialias: true });
  threeRenderer.setSize(container.clientWidth, container.clientHeight);
  container.innerHTML = '';
  container.appendChild(threeRenderer.domElement);

  // Lights
  threeScene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const d1 = new THREE.DirectionalLight(0xffffff, 0.6); d1.position.set(200, 300, 200); threeScene.add(d1);
  const d2 = new THREE.DirectionalLight(0xffffff, 0.3); d2.position.set(-200, 100, -200); threeScene.add(d2);

  // Orbit controls
  let isDragging = false, prevX = 0, prevY = 0;
  let azimuth = Math.PI / 4, elevation = Math.PI / 6, dist = 500; // ~30° elevation

  function updateCamera() {
    threeCamera.position.set(
      dist * Math.cos(elevation) * Math.sin(azimuth),
      dist * Math.sin(elevation),
      dist * Math.cos(elevation) * Math.cos(azimuth)
    );
    threeCamera.lookAt(0, params.cell_h * 0.4, 0);
  }

  threeRenderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  window.addEventListener('mouseup', () => isDragging = false);
  threeRenderer.domElement.addEventListener('mousemove', e => {
    if (!isDragging) return;
    azimuth += (e.clientX - prevX) * 0.005;
    elevation += (e.clientY - prevY) * 0.005;
    elevation = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, elevation));
    prevX = e.clientX; prevY = e.clientY;
    updateCamera();
  });
  threeRenderer.domElement.addEventListener('wheel', e => {
    dist *= e.deltaY > 0 ? 1.1 : 0.9;
    dist = Math.max(50, Math.min(5000, dist));
    updateCamera(); e.preventDefault();
  }, { passive: false });

  threeControls = {
    updateCamera,
    setDist: d => { dist = d; updateCamera(); },
    resetView: () => { azimuth = Math.PI / 4; elevation = Math.PI / 6; updateCamera(); }
  };
  updateCamera();

  function animate() {
    requestAnimationFrame(animate);
    if (autoSpin) { azimuth += 0.005; updateCamera(); }
    threeRenderer.render(threeScene, threeCamera);
  }
  animate();
  threeInited = true;

  const ro = new ResizeObserver(() => {
    if (container.clientWidth === 0 || container.clientHeight === 0) return;
    threeCamera.aspect = container.clientWidth / container.clientHeight;
    threeCamera.updateProjectionMatrix();
    threeRenderer.setSize(container.clientWidth, container.clientHeight);
  });
  ro.observe(container);
}

function update3DScene() {
  if (!threeScene || !simResult) return;

  // Clear non-light children
  const toRemove = [];
  threeScene.children.forEach(c => { if (!c.isLight) toRemove.push(c); });
  toRemove.forEach(c => threeScene.remove(c));

  const s = simResult;
  const rScale = +document.getElementById('p_rscale').value;
  const cutDeg = +document.getElementById('p_cut').value;
  const cutRad = cutDeg * Math.PI / 180;
  const cellH = params.cell_h;
  const mandrelR = params.mandrel_d / 2;

  // Mandrel as solid grey cylinder
  const mandrelGeo = new THREE.CylinderGeometry(mandrelR * rScale, mandrelR * rScale, cellH, 64);
  const mandrelMat = new THREE.MeshPhongMaterial({ color: 0x888899, transparent: true, opacity: 0.6 });
  const mandrelMesh = new THREE.Mesh(mandrelGeo, mandrelMat);
  mandrelMesh.position.y = cellH / 2;
  threeScene.add(mandrelMesh);

  // Build layer cylinders with actual radial thickness
  s.turns.forEach((turn, ti) => {
    const prevR = ti > 0 ? s.turns[ti-1].r : mandrelR;
    const innerR = prevR;
    const bandW = turn.r - innerR;
    const nActive = turn.active.length;
    if (nActive === 0) return;

    turn.active.forEach((layer, li) => {
      const rInner = (innerR + (bandW / nActive) * li) * rScale;
      const rOuter = (innerR + (bandW / nActive) * (li + 1)) * rScale;
      const isElectrode = layer.type === 'cathode' || layer.type === 'anode';

      const mat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(layer.color),
        transparent: true,
        opacity: isElectrode ? 0.9 : 0.7,
        side: THREE.DoubleSide
      });

      // Outer cylinder surface
      const geoO = new THREE.CylinderGeometry(rOuter, rOuter, cellH, 64, 1, true, 0, cutRad);
      const meshO = new THREE.Mesh(geoO, mat);
      meshO.position.y = cellH / 2;
      threeScene.add(meshO);

      // Inner cylinder surface
      const geoI = new THREE.CylinderGeometry(rInner, rInner, cellH, 64, 1, true, 0, cutRad);
      const meshI = new THREE.Mesh(geoI, mat.clone());
      meshI.position.y = cellH / 2;
      threeScene.add(meshI);

      // Top and bottom ring caps
      [0, cellH].forEach(yy => {
        const ring = new THREE.RingGeometry(rInner, rOuter, 64, 1, 0, cutRad);
        const ringMesh = new THREE.Mesh(ring, mat.clone());
        ringMesh.rotation.x = -Math.PI / 2;
        ringMesh.position.y = yy;
        threeScene.add(ringMesh);
      });

      // Cross-section cut faces — filled colored rectangles at both cut edges
      if (cutDeg < 360) {
        const thickness = rOuter - rInner;
        const midR = (rInner + rOuter) / 2;
        const cutMat = new THREE.MeshPhongMaterial({
          color: new THREE.Color(layer.color),
          side: THREE.DoubleSide,
          opacity: 1.0, transparent: false
        });

        // Cut face at angle 0 — plane faces along +Z, so rotate to face Z direction
        const cutGeo1 = new THREE.PlaneGeometry(thickness, cellH);
        const cutMesh1 = new THREE.Mesh(cutGeo1, cutMat);
        // Position at midR along X axis, rotated to face +Z (perpendicular to radius)
        cutMesh1.position.set(midR, cellH/2, 0);
        cutMesh1.rotation.y = Math.PI / 2;
        threeScene.add(cutMesh1);

        // Cut face at cutaway angle
        const cutGeo2 = new THREE.PlaneGeometry(thickness, cellH);
        const cutMesh2 = new THREE.Mesh(cutGeo2, cutMat.clone());
        cutMesh2.position.set(midR * Math.cos(cutRad), cellH/2, midR * Math.sin(cutRad));
        cutMesh2.rotation.y = Math.PI / 2 + cutRad;
        threeScene.add(cutMesh2);
      }
    });
  });

  // Tabs — protruding vertically from the top of the cell
  // Three.js CylinderGeometry: angle 0 starts at +Z axis, goes CCW in XZ plane
  // Cell convention: 0° = +X (3 o'clock), 90° = +Z (12 o'clock when viewed top-down)
  // Convert cell angle to Three.js angle: threeAngle = cellAngle (both CCW from +Z for sin/cos)
  const tabH = params.tab_h;
  const tabW = params.tab_w;

  function addTabs(tabs, color, emissive, cellAngleDeg) {
    // Convert to radians — in Three.js XZ plane, use sin for X and cos for Z
    const angRad = cellAngleDeg * Math.PI / 180;
    tabs.forEach(tab => {
      const r = tab.r * rScale;
      // Tab box: wider and taller for visibility
      const geo = new THREE.BoxGeometry(tabW * 0.4, tabH * 2, 1.5);
      const mat = new THREE.MeshPhongMaterial({ color, emissive, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geo, mat);
      // Position: on the top face, at the correct angle
      // X = r * sin(angle), Z = r * cos(angle) matches CylinderGeometry convention
      mesh.position.set(
        r * Math.sin(angRad),
        cellH + tabH,
        r * Math.cos(angRad)
      );
      // Rotate tab to face tangent to the cylinder at this angle
      mesh.rotation.y = angRad;
      threeScene.add(mesh);
    });
  }

  addTabs(s.cTabs, 0x3b82f6, 0x1a3a6b, params.cath_angle);
  addTabs(s.aTabs, 0x16a34a, 0x0a4a22, params.anod_angle);

  // Set camera distance
  const outerScaledR = s.outerR * rScale;
  const camDist = Math.max(outerScaledR * 2.5, cellH * 1.2);
  threeControls.setDist(camDist);
}

// 3D controls
document.getElementById('p_cut').addEventListener('input', e => {
  document.getElementById('p_cut_val').textContent = e.target.value;
  if (currentView === '3d') update3DScene();
});
document.getElementById('p_rscale').addEventListener('input', e => {
  document.getElementById('p_rscale_val').textContent = e.target.value;
  if (currentView === '3d') update3DScene();
});
document.getElementById('btnSpin').addEventListener('click', () => {
  autoSpin = !autoSpin;
  document.getElementById('btnSpin').textContent = autoSpin ? 'Stop spin' : 'Auto-spin';
});
document.getElementById('btnResetCam').addEventListener('click', () => {
  if (threeControls) threeControls.resetView();
});

// ========== CSV EXPORT ==========
document.getElementById('btnExport').addEventListener('click', () => {
  if (!simResult) return;
  const s = simResult;
  let csv = 'Type,Tab#,Turn,Radius_mm,Pitch_mm,ArcLen_mm,Spacing_mm,Angle_deg\n';
  s.cTabs.forEach(t => {
    csv += `Cathode,${t.idx},${t.turn},${t.r.toFixed(3)},${t.pitch.toFixed(2)},${t.arcLen.toFixed(1)},${t.spacing ? t.spacing.toFixed(1) : '—'},${params.cath_angle}\n`;
  });
  s.aTabs.forEach(t => {
    csv += `Anode,${t.idx},${t.turn},${t.r.toFixed(3)},${t.pitch.toFixed(2)},${t.arcLen.toFixed(1)},${t.spacing ? t.spacing.toFixed(1) : '—'},${params.anod_angle}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jellyroll-tabs-${Date.now()}.csv`;
  a.click();
});

// ========== SAVE/LOAD ==========
document.getElementById('btnSave').addEventListener('click', () => {
  const data = { version: '1.1', params, layers, elecProps };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jellyroll-config-${Date.now()}.json`;
  a.click();
});

document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('fileLoad').click());
document.getElementById('fileLoad').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.version && data.params && data.layers) {
        params = data.params;
        layers = data.layers;
        if (data.elecProps) elecProps = data.elecProps;
        for (const [k, v] of Object.entries(params)) {
          const el = document.getElementById('p_' + k);
          if (el) el.value = v;
        }
        for (const [k, v] of Object.entries(elecProps)) {
          const el = document.getElementById('ep_' + k);
          if (el) el.value = v;
        }
        buildLayerUI();
        runSimulation();
      }
    } catch (err) { alert('Invalid config file'); }
  };
  reader.readAsText(file);
});

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  if (simResult && currentView !== '3d') renderView();
});

// ========== RUN BUTTON ==========
document.getElementById('btnRun').addEventListener('click', runSimulation);

// ========== INIT ==========
buildLayerUI();
runSimulation();
</script>
